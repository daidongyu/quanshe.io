    <title>翠翠大战僵尸嘉</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #2d1810;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        font-family: 'Arial', sans-serif;
      }
      canvas {
        display: block;
        margin: 0 auto;
      }
      #startScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #ffffff, #fbb4ff);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        color: #fff;
      }
      #startScreen h1 {
        font-size: min(8vw, 3em);
        text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        margin-bottom: 20px;
      }
      #startScreen h2 {
        font-size: min(5vw, 1.5em);
        margin-bottom: 40px;
        opacity: 0.8;
      }
      .btn {
        padding: 15px 60px;
        font-size: min(5vw, 1.5em);
        background: #ff6b35;
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }
      .btn:active {
        transform: scale(0.95);
      }
      #gameOver {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        color: #fff;
      }
      #gameOver h1 {
        font-size: min(8vw, 2.5em);
        margin-bottom: 10px;
      }
      #gameOver p {
        font-size: min(4vw, 1.2em);
        margin-bottom: 30px;
      }
    </style>
  </head>

          enrageSpeed: 0.8,
        },
        door: {
          name: '铁门僵尸嘉',
          hp: 1100,
          speed: 0.25,
          color: '#455A64',
          damage: 10,
          emoji: '🧟',
        },
      }

      // ============ 游戏状态 ============
      let sun = 500
      let plants = [] // {row, col, type, hp, maxHp, timer, armed, chewing, chewTimer, squashState, squashTarget}
      let zombies = [] // {row, x, type, hp, maxHp, speed, eating, slowed, slowTimer, jumped, enraged}
      let projectiles = [] // {row, x, y, speed, damage, slow}
      let suns = [] // {x, y, vy, timer, type}
      let particles = [] // {x, y, vx, vy, life, color, text}
      let lawnMowers = [] // {row, x, active, triggered}
      let selectedPlant = null
      let wave = 0
      let waveTimer = 0
      let zombiesSpawned = 0
      let zombiesPerWave = 5
      let maxWaves = 20
      let gameRunning = false
      let gameFrame = 0
      let score = 0
      let shovelMode = false

      function initGame() {
        sun = 500
        plants = []
        zombies = []
        projectiles = []
        suns = []
        particles = []
        selectedPlant = null
        wave = 0
        waveTimer = 300
        zombiesSpawned = 0
        zombiesPerWave = 5
        gameRunning = true
        gameFrame = 0
        score = 0
        shovelMode = false
        lawnMowers = []
        for (let r = 0; r < ROWS; r++) {
          lawnMowers.push({
            row: r,
            x: FIELD_X - CELL_W * 0.6,
            active: true,
            triggered: false,
            speed: 0,
          })
        }
        document.getElementById('gameOver').style.display = 'none'
      }

      // ============ 绘制函数 ============
      function drawCuicuiHead(x, y, size) {
        ctx.save()
        ctx.beginPath()
        ctx.arc(x, y, size / 2, 0, Math.PI * 2)
        ctx.clip()
        ctx.drawImage(cuicuiImg, x - size / 2, y - size / 2, size, size)
        ctx.restore()
        ctx.beginPath()
        ctx.arc(x, y, size / 2, 0, Math.PI * 2)
        ctx.strokeStyle = '#fff'
        ctx.lineWidth = 1.5
        ctx.stroke()
      }

      function drawPlant(plant) {
        const x = FIELD_X + plant.col * CELL_W + CELL_W / 2
        const y = FIELD_Y + plant.row * CELL_H + CELL_H / 2
        const def = PLANT_TYPES[plant.type]
        const s = Math.min(CELL_W, CELL_H) * 0.7
        const headSize = s * 0.75

        ctx.save()

        // 底部装饰（茎/叶子/身体色环）
        if (def.type === 'wall') {
          // 坚果墙：外环
          ctx.fillStyle = def.color
          ctx.beginPath()
          ctx.arc(x, y - s * 0.05, headSize / 2 + 5, 0, Math.PI * 2)
          ctx.fill()
        } else if (def.type === 'bomb') {
          // 樱桃炸弹：红色光晕
          ctx.fillStyle = 'rgba(244,67,54,0.4)'
          ctx.beginPath()
          ctx.arc(x, y - s * 0.05, headSize / 2 + 8, 0, Math.PI * 2)
          ctx.fill()
        } else if (def.type === 'jalapeno') {
          // 辣椒：橙色光晕
          ctx.fillStyle = 'rgba(255,87,34,0.4)'
          ctx.beginPath()
          ctx.arc(x, y - s * 0.05, headSize / 2 + 8, 0, Math.PI * 2)
          ctx.fill()
        } else {
          // 其它植物：茎 + 叶子
          ctx.fillStyle = '#4CAF50'
          ctx.fillRect(x - 3, y + s * 0.1, 6, s * 0.35)
          ctx.beginPath()
          ctx.ellipse(
            x - s * 0.2,
            y + s * 0.25,
            s * 0.15,
            s * 0.08,
            -0.3,
            0,
            Math.PI * 2,
          )
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(
            x + s * 0.18,
            y + s * 0.2,
            s * 0.12,
            s * 0.07,
            0.3,
            0,
            Math.PI * 2,
          )
          ctx.fill()
        }

        // 植物类型色环（围绕头像）
        ctx.beginPath()
        ctx.arc(x, y - s * 0.05, headSize / 2 + 3, 0, Math.PI * 2)
        ctx.fillStyle = def.color
        ctx.fill()

        // ★ 核心：翠翠圆形头像（大尺寸居中）
        drawCuicuiHead(x, y - s * 0.05, headSize)

        // 植物名称
        ctx.fillStyle = '#fff'
        ctx.font = `bold ${Math.max(8, s * 0.16)}px Arial`
        ctx.textAlign = 'center'
        ctx.strokeStyle = '#000'
        ctx.lineWidth = 2
        ctx.strokeText(def.name, x, y + s * 0.48)
        ctx.fillText(def.name, x, y + s * 0.48)

        // 特殊标识角标
        if (def.type === 'shooter' && def.slow) {
          ctx.fillStyle = '#00E5FF'
          ctx.beginPath()
          ctx.arc(
            x + headSize / 2 - 2,
            y - s * 0.05 - headSize / 2 + 2,
            6,
            0,
            Math.PI * 2,
          )
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.font = `bold 8px Arial`
          ctx.fillText(
            '❄',
            x + headSize / 2 - 2,
            y - s * 0.05 - headSize / 2 + 5,
          )
        }
        if (def.type === 'shooter' && def.double) {
          ctx.fillStyle = '#69F0AE'
          ctx.beginPath()
          ctx.arc(
            x + headSize / 2 - 2,
            y - s * 0.05 - headSize / 2 + 2,
            6,
            0,
            Math.PI * 2,
          )
          ctx.fill()
          ctx.fillStyle = '#000'
          ctx.font = `bold 8px Arial`
          ctx.fillText(
            'x2',
            x + headSize / 2 - 2,
            y - s * 0.05 - headSize / 2 + 5,
          )
        }
        if (def.type === 'mine' && !plant.armed) {
          ctx.fillStyle = 'rgba(0,0,0,0.5)'
          ctx.beginPath()
          ctx.arc(x, y - s * 0.05, headSize / 2, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.font = `bold ${s * 0.18}px Arial`
          ctx.fillText('准备中', x, y - s * 0.02)
        }
        if (def.type === 'squash' && plant.squashState === 'jumping') {
          // 窝瓜跳跃中不画在原位
        }

        // HP条
        if (plant.hp < plant.maxHp) {
          const barW = CELL_W * 0.6
          const barH = 4
          const barX = x - barW / 2
          const barY = y - s * 0.05 - headSize / 2 - 6
          ctx.fillStyle = '#333'
          ctx.fillRect(barX, barY, barW, barH)
          ctx.fillStyle = plant.hp > plant.maxHp * 0.3 ? '#4CAF50' : '#F44336'
          ctx.fillRect(barX, barY, barW * (plant.hp / plant.maxHp), barH)
        }
        ctx.restore()
      }

      function drawZombie(z) {
        const y = FIELD_Y + z.row * CELL_H + CELL_H / 2
        const def = ZOMBIE_TYPES[z.type]
        const s = Math.min(CELL_W, CELL_H) * 0.75
        const wobble = Math.sin(gameFrame * 0.1 + z.x) * 2

        ctx.save()
        ctx.translate(z.x, y + wobble)

        // 身体
        ctx.fillStyle = z.enraged ? '#F44336' : '#546E7A'
        ctx.fillRect(-s * 0.15, s * 0.05, s * 0.3, s * 0.35)

        // 胳膊
        ctx.fillStyle = '#78909C'
        const armSwing = Math.sin(gameFrame * 0.15 + z.x) * 0.3
        ctx.save()
        ctx.translate(-s * 0.15, s * 0.1)
        ctx.rotate(-0.5 + armSwing)
        ctx.fillRect(-s * 0.05, 0, s * 0.08, s * 0.25)
        ctx.restore()
        ctx.save()
        ctx.translate(s * 0.15, s * 0.1)
        ctx.rotate(0.5 - armSwing)
        ctx.fillRect(-s * 0.03, 0, s * 0.08, s * 0.25)
        ctx.restore()

        // 腿
        ctx.fillStyle = '#455A64'
        ctx.fillRect(-s * 0.12, s * 0.38, s * 0.1, s * 0.2)
        ctx.fillRect(s * 0.02, s * 0.38, s * 0.1, s * 0.2)

        // 头
        ctx.fillStyle = z.slowed ? '#B3E5FC' : '#90A4AE'
        ctx.beginPath()
        ctx.arc(0, -s * 0.05, s * 0.2, 0, Math.PI * 2)
        ctx.fill()

        // 头盔/路障等
        if (z.type === 'bucket') {
          ctx.fillStyle = '#78909C'
          ctx.fillRect(-s * 0.2, -s * 0.3, s * 0.4, s * 0.15)
          ctx.fillRect(-s * 0.15, -s * 0.35, s * 0.3, s * 0.1)
          ctx.fillStyle = '#fff'
          ctx.font = `bold ${s * 0.1}px Arial`
          ctx.textAlign = 'center'
          ctx.fillText('钢盔', 0, -s * 0.22)
        } else if (z.type === 'cone') {
          ctx.fillStyle = '#FF9800'
          ctx.beginPath()
          ctx.moveTo(0, -s * 0.4)
          ctx.lineTo(-s * 0.18, -s * 0.1)
          ctx.lineTo(s * 0.18, -s * 0.1)
          ctx.closePath()
          ctx.fill()
        } else if (z.type === 'flag') {
          ctx.fillStyle = '#795548'
          ctx.fillRect(s * 0.15, -s * 0.4, 3, s * 0.45)
          ctx.fillStyle = '#F44336'
          ctx.fillRect(s * 0.18, -s * 0.4, s * 0.2, s * 0.12)
        } else if (z.type === 'pole') {
          ctx.fillStyle = '#795548'
          ctx.fillRect(s * 0.15, -s * 0.15, 3, s * 0.5)
          if (!z.jumped) {
            ctx.fillStyle = '#9C27B0'
            ctx.font = `${s * 0.1}px Arial`
            ctx.textAlign = 'center'
            ctx.fillText('跳', 0, -s * 0.3)
          }
        } else if (z.type === 'newspaper') {
          if (!z.enraged) {
            ctx.fillStyle = '#EFEBE9'
            ctx.fillRect(-s * 0.25, -s * 0.05, s * 0.1, s * 0.25)
          }
        } else if (z.type === 'door') {
          ctx.fillStyle = '#607D8B'
          ctx.fillRect(-s * 0.35, -s * 0.15, s * 0.15, s * 0.45)
        }

        // "僵尸嘉"名字
        ctx.fillStyle = '#fff'
        ctx.font = `bold ${Math.max(9, s * 0.16)}px Arial`
        ctx.textAlign = 'center'
        ctx.strokeStyle = '#000'
        ctx.lineWidth = 2
        ctx.strokeText(def.name, 0, s * 0.7)
        ctx.fillText(def.name, 0, s * 0.7)

        // HP条
        const barW = s * 0.5
        const barH = 4
        ctx.fillStyle = '#333'
        ctx.fillRect(-barW / 2, -s * 0.45, barW, barH)
        ctx.fillStyle =
          z.hp > def.hp * 0.5
            ? '#4CAF50'
            : z.hp > def.hp * 0.25
              ? '#FFC107'
              : '#F44336'
        ctx.fillRect(-barW / 2, -s * 0.45, barW * (z.hp / z.maxHp), barH)

        ctx.restore()
      }

      function drawUI() {
        // 顶栏
        ctx.fillStyle = 'rgba(50,30,15,0.9)'
        ctx.fillRect(0, 0, W, TOP_BAR)

        // 阳光
        ctx.fillStyle = '#FFD700'
        ctx.font = `bold ${Math.min(20, W * 0.04)}px Arial`
        ctx.textAlign = 'left'
        ctx.fillText('☀️ ' + sun, 10, 25)

        // 波次
        ctx.fillStyle = '#fff'
        ctx.font = `${Math.min(14, W * 0.03)}px Arial`
        ctx.fillText('第 ' + wave + '/' + maxWaves + ' 波', 10, 48)

        // 分数
        ctx.textAlign = 'right'
        ctx.fillText('分数: ' + score, W - 10, 25)

        // 铲子
        const shovelX = W - 55
        const shovelY = 30
        ctx.fillStyle = shovelMode ? '#FF5722' : '#8D6E63'
        ctx.fillRect(shovelX, shovelY, 40, 22)
        ctx.fillStyle = '#fff'
        ctx.font = `12px Arial`
        ctx.textAlign = 'center'
        ctx.fillText('铲子', shovelX + 20, shovelY + 16)

        // 植物卡牌栏
        const cardH = 55
        const cardW = Math.min(60, (W - 20) / PLANT_ORDER.length)
        const barY = H - cardH - 5
        ctx.fillStyle = 'rgba(50,30,15,0.9)'
        ctx.fillRect(0, barY - 5, W, cardH + 10)

        PLANT_ORDER.forEach((key, i) => {
          const def = PLANT_TYPES[key]
          const cx = 10 + i * (cardW + 2)
          const cy = barY
          const selected = selectedPlant === key
          const canAfford = sun >= def.cost

          ctx.fillStyle = selected
            ? '#4CAF50'
            : canAfford
              ? 'rgba(255,255,255,0.15)'
              : 'rgba(0,0,0,0.4)'
          ctx.strokeStyle = selected ? '#69F0AE' : '#555'
          ctx.lineWidth = selected ? 2 : 1
          ctx.beginPath()
          ctx.roundRect(cx, cy, cardW, cardH, 5)
          ctx.fill()
          ctx.stroke()

          // 翠翠头像（卡片中心大头像）
          if (cuicuiImg.complete) {
            const headS = Math.min(24, cardW * 0.5)
            // 植物色环
            ctx.beginPath()
            ctx.arc(cx + cardW / 2, cy + 18, headS / 2 + 2, 0, Math.PI * 2)
            ctx.fillStyle = def.color
            ctx.fill()
            drawCuicuiHead(cx + cardW / 2, cy + 18, headS)
          }

          ctx.fillStyle = canAfford ? '#fff' : '#888'
          ctx.font = `${Math.max(7, Math.min(9, cardW * 0.17))}px Arial`
          ctx.textAlign = 'center'
          ctx.fillText(def.name, cx + cardW / 2, cy + 37)
          ctx.fillStyle = '#FFD700'
          ctx.font = `bold ${Math.max(8, Math.min(10, cardW * 0.18))}px Arial`
          ctx.fillText(def.cost, cx + cardW / 2, cy + 49)
        })
      }

      function drawField() {
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const x = FIELD_X + c * CELL_W
            const y = FIELD_Y + r * CELL_H
            ctx.fillStyle = (r + c) % 2 === 0 ? '#4a8c3f' : '#5a9c4f'
            ctx.fillRect(x, y, CELL_W, CELL_H)
            ctx.strokeStyle = 'rgba(0,0,0,0.1)'
            ctx.strokeRect(x, y, CELL_W, CELL_H)
          }
        }
      }

      function drawProjectiles() {
        projectiles.forEach((p) => {
          ctx.fillStyle = p.slow ? '#00E5FF' : '#4CAF50'
          ctx.beginPath()
          ctx.arc(p.x, p.y, 5, 0, Math.PI * 2)
          ctx.fill()
          if (p.slow) {
            ctx.fillStyle = 'rgba(0,229,255,0.3)'
            ctx.beginPath()
            ctx.arc(p.x, p.y, 8, 0, Math.PI * 2)
            ctx.fill()
          }
        })
      }

      function drawSuns() {
        suns.forEach((s) => {
          const r = 15
          ctx.fillStyle = '#FFD700'
          ctx.beginPath()
          ctx.arc(s.x, s.y, r, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#FFF176'
          ctx.beginPath()
          ctx.arc(s.x, s.y, r * 0.6, 0, Math.PI * 2)
          ctx.fill()
          // 光芒
          for (let i = 0; i < 8; i++) {
            const a = ((Math.PI * 2) / 8) * i + gameFrame * 0.02
            ctx.fillStyle = '#FFD700'
            ctx.beginPath()
            ctx.moveTo(s.x + Math.cos(a) * r * 0.7, s.y + Math.sin(a) * r * 0.7)
            ctx.lineTo(
              s.x + Math.cos(a - 0.15) * r * 1.3,
              s.y + Math.sin(a - 0.15) * r * 1.3,
            )
            ctx.lineTo(
              s.x + Math.cos(a + 0.15) * r * 1.3,
              s.y + Math.sin(a + 0.15) * r * 1.3,
            )
            ctx.closePath()
            ctx.fill()
          }
          ctx.fillStyle = '#fff'
          ctx.font = 'bold 10px Arial'
          ctx.textAlign = 'center'
          ctx.fillText('25', s.x, s.y + 4)
        })
      }

      function drawParticles() {
        particles.forEach((p) => {
          ctx.globalAlpha = p.life / p.maxLife
          ctx.fillStyle = p.color
          if (p.text) {
            ctx.font = `bold ${p.size || 14}px Arial`
            ctx.textAlign = 'center'
            ctx.fillText(p.text, p.x, p.y)
          } else {
            ctx.beginPath()
            ctx.arc(p.x, p.y, p.size || 3, 0, Math.PI * 2)
            ctx.fill()
          }
          ctx.globalAlpha = 1
        })
      }

      function drawLawnMowers() {
        lawnMowers.forEach((lm) => {
          if (!lm.active) return
          const y = FIELD_Y + lm.row * CELL_H + CELL_H / 2
          ctx.fillStyle = '#F44336'
          ctx.fillRect(lm.x - 15, y - 10, 30, 20)
          ctx.fillStyle = '#fff'
          ctx.font = '10px Arial'
          ctx.textAlign = 'center'
          ctx.fillText('🚜', lm.x, y + 4)
        })
      }

      // ============ 游戏逻辑 ============
      function getPlantAt(row, col) {
        return plants.find((p) => p.row === row && p.col === col)
      }

      function spawnSun(x, y, type) {
        suns.push({
          x,
          y,
          vy: type === 'sky' ? 0.5 : -1.5,
          timer: type === 'sky' ? 600 : 300,
          targetY: y + (type === 'sky' ? 100 + Math.random() * 100 : 0),
          type,
        })
      }

      function spawnZombie(row, type) {
        const def = ZOMBIE_TYPES[type]
        zombies.push({
          row,
          x: FIELD_X + COLS * CELL_W + 20 + Math.random() * 80,
          type,
          hp: def.hp,
          maxHp: def.hp,
          speed: def.speed,
          eating: false,
          slowed: false,
          slowTimer: 0,
          jumped: false,
          enraged: false,
        })
      }

      function explode(cx, cy, radius) {
        zombies.forEach((z) => {
          const zy = FIELD_Y + z.row * CELL_H + CELL_H / 2
          const dx = z.x - cx
          const dy = zy - cy
          if (Math.sqrt(dx * dx + dy * dy) < radius) {
            z.hp -= 1800
            addParticle(z.x, zy, '#FF5722', '💥', 20)
          }
        })
        // 爆炸特效
        for (let i = 0; i < 20; i++) {
          const a = Math.random() * Math.PI * 2
          const sp = 1 + Math.random() * 3
          particles.push({
            x: cx,
            y: cy,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            life: 30 + Math.random() * 20,
            maxLife: 50,
            color: ['#FF5722', '#FFC107', '#FFEB3B'][
              Math.floor(Math.random() * 3)
            ],
            size: 3 + Math.random() * 5,
          })
        }
      }

      function addParticle(x, y, color, text, size) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 2,
          vy: -1 - Math.random(),
          life: 40,
          maxLife: 40,
          color,
          text,
          size,
        })
      }

      function updatePlants() {
        plants.forEach((p) => {
          const def = PLANT_TYPES[p.type]
          p.timer++

          if (def.type === 'producer' && p.timer % 600 === 0) {
            const px = FIELD_X + p.col * CELL_W + CELL_W / 2
            const py = FIELD_Y + p.row * CELL_H + CELL_H / 2
            spawnSun(px + (Math.random() - 0.5) * 30, py - 20, 'plant')
          }

          if (def.type === 'shooter') {
            const hasZombie = zombies.some(
              (z) =>
                z.row === p.row && z.x > FIELD_X + p.col * CELL_W && z.hp > 0,
            )
            if (hasZombie && p.timer % def.fireRate === 0) {
              const px = FIELD_X + p.col * CELL_W + CELL_W * 0.8
              const py = FIELD_Y + p.row * CELL_H + CELL_H / 2
              projectiles.push({
                row: p.row,
                x: px,
                y: py,
                speed: 4,
                damage: def.damage,
                slow: def.slow || false,
              })
              if (def.double) {
                setTimeout(() => {
                  projectiles.push({
                    row: p.row,
                    x: px,
                    y: py,
                    speed: 4,
                    damage: def.damage,
                    slow: def.slow || false,
                  })
                }, 100)
              }
            }
          }

          if (def.type === 'mine') {
            if (!p.armed && p.timer > def.armTime) p.armed = true
            if (p.armed) {
              const zOnMe = zombies.find(
                (z) =>
                  z.row === p.row &&
                  Math.abs(z.x - (FIELD_X + p.col * CELL_W + CELL_W / 2)) <
                    CELL_W * 0.5 &&
                  z.hp > 0,
              )
              if (zOnMe) {
                zOnMe.hp -= 1800
                const px = FIELD_X + p.col * CELL_W + CELL_W / 2
                const py = FIELD_Y + p.row * CELL_H + CELL_H / 2
                explode(px, py, CELL_W)
                p.hp = 0
              }
            }
          }

          if (def.type === 'chomper') {
            if (p.chewing) {
              p.chewTimer--
              if (p.chewTimer <= 0) p.chewing = false
            } else {
              const zNear = zombies.find(
                (z) =>
                  z.row === p.row &&
                  z.x > FIELD_X + p.col * CELL_W &&
                  z.x < FIELD_X + (p.col + 2) * CELL_W &&
                  z.hp > 0,
              )
              if (zNear) {
                zNear.hp -= 1800
                p.chewing = true
                p.chewTimer = def.chewTime
                addParticle(
                  zNear.x,
                  FIELD_Y + zNear.row * CELL_H + CELL_H / 2,
                  '#9C27B0',
                  '😋',
                  18,
                )
              }
            }
          }

          if (def.type === 'squash' && p.squashState === undefined) {
            const zNear = zombies.find(
              (z) =>
                z.row === p.row &&
                z.x < FIELD_X + (p.col + 3) * CELL_W &&
                z.x > FIELD_X + p.col * CELL_W &&
                z.hp > 0,
            )
            if (zNear) {
              p.squashState = 'jumping'
              p.squashTarget = zNear
              p.squashX = FIELD_X + p.col * CELL_W + CELL_W / 2
            }
          }
          if (p.squashState === 'jumping') {
            const tx = p.squashTarget.x
            p.squashX = p.squashX || FIELD_X + p.col * CELL_W
            p.squashX += (tx - p.squashX) * 0.15
            if (Math.abs(p.squashX - tx) < 10) {
              p.squashTarget.hp -= 1800
              const py = FIELD_Y + p.row * CELL_H + CELL_H / 2
              explode(tx, py, CELL_W * 0.5)
              p.hp = 0
            }
          }
        })
        plants = plants.filter((p) => p.hp > 0)
      }

      function updateZombies() {
        zombies.forEach((z) => {
          if (z.hp <= 0) return
          const def = ZOMBIE_TYPES[z.type]

          if (z.slowed) {
            z.slowTimer--
            if (z.slowTimer <= 0) z.slowed = false
          }

          // 跳跃僵尸嘉
          if (z.type === 'pole' && !z.jumped) {
            const pInFront = plants.find(
              (p) =>
                p.row === z.row &&
                Math.abs(FIELD_X + p.col * CELL_W + CELL_W / 2 - z.x) <
                  CELL_W * 1.2 &&
                z.x > FIELD_X + p.col * CELL_W,
            )
            if (pInFront) {
              z.x = FIELD_X + pInFront.col * CELL_W - CELL_W
              z.jumped = true
              addParticle(
                z.x,
                FIELD_Y + z.row * CELL_H + CELL_H / 2,
                '#9C27B0',
                '跳!',
                16,
              )
            }
          }

          // 报纸僵尸嘉激怒
          if (z.type === 'newspaper' && !z.enraged && z.hp <= def.enrageHp) {
            z.enraged = true
            z.speed = def.enrageSpeed
            addParticle(
              z.x,
              FIELD_Y + z.row * CELL_H + CELL_H / 2,
              '#F44336',
              '怒!',
              16,
            )
          }

          const plant = plants.find(
            (p) =>
              p.row === z.row &&
              Math.abs(FIELD_X + p.col * CELL_W + CELL_W / 2 - z.x) <
                CELL_W * 0.5,
          )
          if (plant) {
            z.eating = true
            if (gameFrame % 30 === 0) {
              plant.hp -= def.damage
            }
          } else {
            z.eating = false
            const speed = z.slowed ? z.speed * 0.5 : z.speed
            z.x -= speed
          }

          // 到达左边界 - 触发割草机
          if (z.x < FIELD_X) {
            const mower = lawnMowers.find(
              (lm) => lm.row === z.row && lm.active && !lm.triggered,
            )
            if (mower) {
              mower.triggered = true
              mower.speed = 5
            } else {
              endGame(false)
            }
          }
        })

        zombies = zombies.filter((z) => {
          if (z.hp <= 0) {
            score += 100
            addParticle(
              z.x,
              FIELD_Y + z.row * CELL_H + CELL_H / 2,
              '#FFD700',
              '+100',
              14,
            )
            return false
          }
          return true
        })
      }

      function updateLawnMowers() {
        lawnMowers.forEach((lm) => {
          if (!lm.active || !lm.triggered) return
          lm.x += lm.speed
          // 消灭同行僵尸
          zombies.forEach((z) => {
            if (z.row === lm.row && Math.abs(z.x - lm.x) < 30 && z.hp > 0) {
              z.hp = 0
              addParticle(
                z.x,
                FIELD_Y + z.row * CELL_H + CELL_H / 2,
                '#F44336',
                '💀',
                16,
              )
            }
          })
          if (lm.x > W + 50) lm.active = false
        })
      }

      function updateProjectiles() {
        projectiles.forEach((p) => {
          p.x += p.speed
          const hitZ = zombies.find(
            (z) => z.row === p.row && Math.abs(z.x - p.x) < 15 && z.hp > 0,
          )
          if (hitZ) {
            hitZ.hp -= p.damage
            if (p.slow) {
              hitZ.slowed = true
              hitZ.slowTimer = 120
            }
            p.hit = true
            addParticle(p.x, p.y, p.slow ? '#00E5FF' : '#4CAF50', '', 4)
          }
        })
        projectiles = projectiles.filter((p) => !p.hit && p.x < W + 10)
      }

      function updateSuns() {
        suns.forEach((s) => {
          s.timer--
          if (s.type === 'sky') {
            if (s.y < s.targetY) s.y += s.vy
          } else {
            s.y += s.vy
            s.vy += 0.05
          }
        })
        suns = suns.filter((s) => s.timer > 0 && s.y < H)
      }

      function updateParticles() {
        particles.forEach((p) => {
          p.x += p.vx || 0
          p.y += p.vy || 0
          p.life--
        })
        particles = particles.filter((p) => p.life > 0)
      }

      function spawnWave() {
        if (wave >= maxWaves) {
          if (zombies.length === 0) endGame(true)
          return
        }
        waveTimer--
        if (waveTimer <= 0) {
          wave++
          zombiesPerWave = 5 + Math.floor(wave * 1.5)
          zombiesSpawned = 0
          waveTimer = 900 + wave * 100
          addParticle(W / 2, H / 2, '#F44336', '第' + wave + '波！', 24)
        }
        if (
          zombiesSpawned < zombiesPerWave &&
          gameFrame % Math.max(30, 120 - wave * 5) === 0
        ) {
          const row = Math.floor(Math.random() * ROWS)
          let type = 'normal'
          const r = Math.random()
          if (wave >= 15 && r > 0.7) type = 'door'
          else if (wave >= 10 && r > 0.65) type = 'pole'
          else if (wave >= 8 && r > 0.6) type = 'newspaper'
          else if (wave >= 5 && r > 0.55) type = 'bucket'
          else if (wave >= 3 && r > 0.5) type = 'cone'
          else if (wave >= 2 && r > 0.7) type = 'flag'
          spawnZombie(row, type)
          zombiesSpawned++
        }
      }

      function spawnSkySun() {
        if (gameFrame % 400 === 0) {
          spawnSun(FIELD_X + Math.random() * COLS * CELL_W, FIELD_Y - 20, 'sky')
        }
      }

      function endGame(won) {
        gameRunning = false
        const go = document.getElementById('gameOver')
        go.style.display = 'flex'
        document.getElementById('goTitle').textContent = won
          ? '🎉 胜利！'
          : '💀 僵尸嘉入侵了！'
        document.getElementById('goMsg').textContent =
          '分数: ' + score + ' | 波次: ' + wave
      }

      // ============ 输入处理 ============
      function handleClick(cx, cy) {
        // 检查阳光点击
        for (let i = suns.length - 1; i >= 0; i--) {
          const s = suns[i]
          if (Math.abs(cx - s.x) < 25 && Math.abs(cy - s.y) < 25) {
            sun += 25
            addParticle(s.x, s.y, '#FFD700', '+25', 14)
            suns.splice(i, 1)
            return
          }
        }

        // 铲子按钮
        const shovelX = W - 55
        const shovelY = 30
        if (
          cx >= shovelX &&
          cx <= shovelX + 40 &&
          cy >= shovelY &&
          cy <= shovelY + 22
        ) {
          shovelMode = !shovelMode
          selectedPlant = null
          return
        }

        // 植物卡牌
        const cardH = 55
        const cardW = Math.min(60, (W - 20) / PLANT_ORDER.length)
        const barY = H - cardH - 5
        if (cy >= barY && cy <= barY + cardH) {
          const idx = Math.floor((cx - 10) / (cardW + 2))
          if (idx >= 0 && idx < PLANT_ORDER.length) {
            const key = PLANT_ORDER[idx]
            if (sun >= PLANT_TYPES[key].cost) {
              selectedPlant = selectedPlant === key ? null : key
              shovelMode = false
            }
            return
          }
        }

        // 种植 / 铲子
        const col = Math.floor((cx - FIELD_X) / CELL_W)
        const row = Math.floor((cy - FIELD_Y) / CELL_H)
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
          if (shovelMode) {
            const idx = plants.findIndex((p) => p.row === row && p.col === col)
            if (idx !== -1) {
              plants.splice(idx, 1)
              shovelMode = false
            }
            return
          }
          if (selectedPlant) {
            const existing = getPlantAt(row, col)
            if (!existing) {
              const def = PLANT_TYPES[selectedPlant]
              sun -= def.cost
              const newPlant = {
                row,
                col,
                type: selectedPlant,
                hp: def.hp,
                maxHp: def.hp,
                timer: 0,
                armed: false,
                chewing: false,
                chewTimer: 0,
              }
              plants.push(newPlant)

              // 樱桃炸弹和火爆辣椒立即触发
              if (def.type === 'bomb') {
                const px = FIELD_X + col * CELL_W + CELL_W / 2
                const py = FIELD_Y + row * CELL_H + CELL_H / 2
                setTimeout(() => {
                  explode(px, py, CELL_W * 1.8)
                  newPlant.hp = 0
                }, 100)
              }
              if (def.type === 'jalapeno') {
                setTimeout(() => {
                  zombies.forEach((z) => {
                    if (z.row === row) {
                      z.hp -= 1800
                      addParticle(
                        z.x,
                        FIELD_Y + z.row * CELL_H + CELL_H / 2,
                        '#FF5722',
                        '🔥',
                        18,
                      )
                    }
                  })
                  // 火焰特效
                  for (let i = 0; i < COLS; i++) {
                    const px = FIELD_X + i * CELL_W + CELL_W / 2
                    const py = FIELD_Y + row * CELL_H + CELL_H / 2
                    addParticle(px, py, '#FF5722', '🔥', 20)
                  }
                  newPlant.hp = 0
                }, 100)
              }

              // selectedPlant = null; // 可以连续种植
            }
          }
        }
      }

      canvas.addEventListener('click', (e) => {
        if (!gameRunning) return
        const rect = canvas.getBoundingClientRect()
        handleClick(e.clientX - rect.left, e.clientY - rect.top)
      })

      canvas.addEventListener(
        'touchstart',
        (e) => {
          if (!gameRunning) return
          e.preventDefault()
          const rect = canvas.getBoundingClientRect()
          const t = e.touches[0]
          handleClick(t.clientX - rect.left, t.clientY - rect.top)
        },
        { passive: false },
      )

      // ============ 主循环 ============
      function gameLoop() {
        if (!gameRunning) {
          requestAnimationFrame(gameLoop)
          return
        }
        gameFrame++

        // 更新
        updatePlants()
        updateZombies()
        updateProjectiles()
        updateSuns()
        updateParticles()
        updateLawnMowers()
        spawnWave()
        spawnSkySun()

        // 绘制
        ctx.clearRect(0, 0, W, H)

        // 背景
        ctx.fillStyle = '#5D4037'
        ctx.fillRect(0, 0, W, H)

        drawField()
        drawLawnMowers()
        plants.forEach(drawPlant)
        drawProjectiles()
        zombies.forEach(drawZombie)
        drawSuns()
        drawParticles()
        drawUI()

        // 选中植物跟随指示
        if (selectedPlant) {
          ctx.fillStyle = 'rgba(76,175,80,0.3)'
          ctx.font = '12px Arial'
          ctx.textAlign = 'center'
          ctx.fillText(
            '点击草地种植 ' + PLANT_TYPES[selectedPlant].name,
            W / 2,
            FIELD_Y - 5,
          )
        }

        requestAnimationFrame(gameLoop)
      }

      // ============ 启动 ============
      document.getElementById('startBtn').addEventListener('click', () => {
        document.getElementById('startScreen').style.display = 'none'
        resize()
        initGame()
        gameLoop()
      })
      document.getElementById('startBtn').addEventListener('touchend', (e) => {
        e.preventDefault()
        document.getElementById('startScreen').style.display = 'none'
        resize()
        initGame()
        gameLoop()
      })

      document.getElementById('restartBtn').addEventListener('click', () => {
        resize()
        initGame()
      })
      document
        .getElementById('restartBtn')
        .addEventListener('touchend', (e) => {
          e.preventDefault()
          resize()
          initGame()
        })

      // roundRect polyfill
      if (!ctx.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (
          x,
          y,
          w,
          h,
          r,
        ) {
          if (typeof r === 'number') r = [r, r, r, r]
          this.moveTo(x + r[0], y)
          this.lineTo(x + w - r[1], y)
          this.quadraticCurveTo(x + w, y, x + w, y + r[1])
          this.lineTo(x + w, y + h - r[2])
          this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h)
          this.lineTo(x + r[3], y + h)
          this.quadraticCurveTo(x, y + h, x, y + h - r[3])
          this.lineTo(x, y + r[0])
          this.quadraticCurveTo(x, y, x + r[0], y)
          this.closePath()
        }
      }
    </script>
  </body>
